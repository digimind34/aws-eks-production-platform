grafana:
  enabled: true
  adminPassword: "Admin@12345"

  service:
    type: ClusterIP

  ingress:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 7d
    scrapeInterval: 30s
    evaluationInterval: 30s

alertmanager:
  enabled: true
  alertmanager:
  alertmanagerSpec:
    alertmanagerConfigSelector:
      matchLabels:
        alertmanagerConfig: eks-platform

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
